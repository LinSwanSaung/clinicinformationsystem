services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thrivecare}
      POSTGRES_USER: ${POSTGRES_USER:-thrivecare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../backend/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-thrivecare}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-thrivecare}
      SUPABASE_URL: http://postgrest-proxy:3000
      SUPABASE_ANON_KEY: local-vm-key
      SUPABASE_SERVICE_KEY: local-vm-key
      TRUST_PROXY: 'true'
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      postgrest-proxy:
        condition: service_started

  postgrest:
    image: postgrest/postgrest:v12.2.8
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-thrivecare}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-thrivecare}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: ${POSTGRES_USER:-thrivecare}
      PGRST_SERVER_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./PostgrestCaddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - postgrest

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend

volumes:
  postgres-data:
  uploads-data:
  caddy-data:
  caddy-config:
